
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Transporte Elefante SAC - Q1/Q2 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .kpi-card { background: white; border-radius: 12px; padding: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        #map { height: 350px; border-radius: 12px; border: 1px solid #e2e8f0; z-index: 10; }
        .style-scrollbar::-webkit-scrollbar { width: 5px; }
        .style-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-8">
        <!-- ENCABEZADO -->
        <div class="bg-slate-900 rounded-2xl text-white shadow-xl p-6 md:p-8">
            <h1 class="text-3xl font-extrabold tracking-tight">Consolidado Dinámico 2026</h1>
            <p id="status-text" class="text-slate-400 font-medium">Conectando a Google Sheets...</p>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mt-6">
                <div class="border-l-4 border-blue-500 pl-4"><p class="text-slate-400 text-xs font-bold uppercase">Cotizaciones</p><p id="kpi-cotizaciones" class="text-3xl font-black">$ 0</p></div>
                <div class="border-l-4 border-emerald-500 pl-4"><p class="text-slate-400 text-xs font-bold uppercase">Ejecutado (Fact+OC)</p><p id="kpi-ejecutado" class="text-3xl font-black text-emerald-400">$ 0</p></div>
                <div class="border-l-4 border-amber-500 pl-4"><p class="text-slate-400 text-xs font-bold uppercase">Por Confirmar</p><p id="kpi-confirmar" class="text-3xl font-black text-amber-400">$ 0</p></div>
                <div class="border-l-4 border-red-500 pl-4"><p class="text-slate-400 text-xs font-bold uppercase">Anulado Total</p><p id="kpi-anulado" class="text-3xl font-black text-red-400">$ 0</p></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
            <div class="lg:col-span-3 kpi-card">
                <h3 class="font-extrabold text-slate-800 uppercase text-sm mb-4">Análisis Comparativo Mensual</h3>
                <canvas id="monthlyChart" height="350"></canvas>
            </div>
            <div class="lg:col-span-2 kpi-card">
                <h3 class="font-extrabold text-slate-800 uppercase text-sm mb-4">Pareto de Flota</h3>
                <canvas id="paretoChart" height="300"></canvas>
            </div>
        </div>
        
        <div class="kpi-card"><div id="map"></div></div>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        const url2026 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8YV16DOopheo-MxtKHU-yAmTI1c8eR1LcT75y-51zj8KmEa5DTsdR9toFm93v-oc06v23kwG9qznD/pub?gid=1850210641&single=true&output=csv';

        const coordGeograficas = {
            "LURÍN":[-12.277, -76.871], "SANTA ANITA":[-12.043, -76.953], "LIMA":[-12.046, -77.042], "CALLAO":[-12.056, -77.118],
            "PASCO":[-10.684, -76.256], "CUSCO":[-13.531, -71.967], "AREQUIPA":[-16.409, -71.537], "TRUJILLO":[-8.109, -79.021],
            "HUAMACHUCO":[-7.812, -78.049], "PACHACAMAC":[-12.228, -76.858], "JULIACA":[-15.489, -70.154]
        };

        async function initDashboard() {
            try {
                const res = await fetch(url2026);
                const csv = await res.text();
                const rows = csv.split('\n').map(r => r.split(','));
                
                // Buscar encabezados (Aprox fila 0 o 1)
                const headers = rows[0].map(h => h.trim().replace(/"/g, '').toUpperCase());
                
                // Mapeo preciso usando tu columna "DESTINO_2" (Indice 8 es Columna I)
                const idxDestino2 = headers.indexOf("DESTINO_2");
                const idxDestino = headers.indexOf("DESTINO");
                const idxFlete = headers.indexOf("FLETE");
                const idxEstado = headers.indexOf("ESTADO");

                let totalEje = 0, totalConf = 0, totalAnul = 0;
                let mensual = {};

                rows.slice(1).forEach(row => {
                    if (row.length < 2) return;
                    let estado = row[idxEstado] ? row[idxEstado].trim().toUpperCase() : "";
                    let monto = parseFloat(row[idxFlete] ? row[idxFlete].replace(/[^\d.]/g, '') : 0) || 0;
                    
                    // Lógica de estados
                    if (estado.includes("FACTURADO") || estado.includes("PROCESO")) totalEje += monto;
                    else if (estado.includes("CONFIRMAR")) totalConf += monto;
                    else if (estado.includes("ANULADO")) totalAnul += monto;
                });

                document.getElementById('kpi-ejecutado').innerText = '$ ' + totalEje.toLocaleString();
                document.getElementById('kpi-confirmar').innerText = '$ ' + totalConf.toLocaleString();
                document.getElementById('kpi-anulado').innerText = '$ ' + totalAnul.toLocaleString();
                document.getElementById('status-text').innerText = "Datos cargados correctamente desde Google Sheets";

            } catch (e) {
                console.error(e);
            }
        }

        initDashboard();
        // Inicializar mapas y gráficos aquí...
    </script>
</body>
</html>
